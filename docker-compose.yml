# worldCup — self-hosted deployment
#
# Deploy target: sparta (10.0.20.22)
# External URL:  https://worldcup.chris.planow.com (public, no auth)
#
# Setup on host:
#   cd ~/worldCup
#   cp worldcup-app/.env.example worldcup-app/.env   # or create .env at repo root
#   docker compose up -d --build
#
# .env file (at repo root) must contain:
#   TURSO_CONNECTION_URL=libsql://<db>.turso.io
#   TURSO_AUTH_TOKEN=<rotate periodically>
#   ADMIN_USERNAME=<admin>
#   SESSION_SECRET=<32+ chars, openssl rand -base64 48>
#
# Port mapping: 127.0.0.1:3002:3000 — loopback only so Caddy is the only
# path to the container. 3000/3001 taken by golfModel/draftModel.

services:
  worldcup:
    build:
      context: ./worldcup-app
      dockerfile: Dockerfile
      # H6: no build args — all routes are dynamic and the container never
      # reads the DB at build time. Turso creds are runtime-only (below).
    image: worldcup-app:local
    container_name: worldcup-app
    restart: unless-stopped
    # L5 — container hardening (defense in depth):
    #   no-new-privileges: setuid binaries inside can't escalate
    #   cap_drop ALL:      Node 22 doesn't need any Linux capabilities
    #                       (port 3000 > 1024, runs as unprivileged uid 1001)
    #   read_only:         root filesystem is read-only; writable paths are
    #                       explicitly tmpfs-mounted
    #   tmpfs:             /tmp for general scratch; /app/.next/cache for
    #                       Next.js runtime fetch-cache writes
    #   mem_limit / pids_limit: prevent runaway container from taking the host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    mem_limit: 512m
    pids_limit: 200
    ports:
      # Reverse proxy (Caddy) lives on citadel (10.0.20.20), a different host
      # from sparta. Cross-host proxying needs LAN reachability, so binding
      # to 0.0.0.0 is required. Edge security is enforced at the homelab
      # firewall (no port forward for 3002).
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      TURSO_CONNECTION_URL: ${TURSO_CONNECTION_URL}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      SESSION_SECRET: ${SESSION_SECRET}
    healthcheck:
      # Force IPv4 — BusyBox wget resolves 'localhost' to ::1 first and Next.js
      # binds to 0.0.0.0 (IPv4) which returns "connection refused" on IPv6.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
